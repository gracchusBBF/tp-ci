name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'              # ✅ Cache des dépendances npm

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      # ✅ Suppression de "npm run start" — bloquant et inutile en CI

  cypress-run:
    runs-on: ubuntu-latest
    needs: build                    # ✅ Attend la fin du job build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'              # ✅ Cache partagé entre les jobs

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          build: npm run build --if-present   # ✅ Build avant les tests
          start: npm start
          wait-on: 'http://localhost:3000'